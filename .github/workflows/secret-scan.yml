name: Secret scan

# Runs the gitleaks CLI directly via its container image. The gitleaks GitHub
# Action requires a paid licence for organisations; the CLI itself is MIT.
# fetch-depth 0 gives gitleaks the full git history on every run (not just the
# diff), so this also functions as a continuous full-history scan.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.18.4@sha256:75bdb2b2f4db213cde0b8295f13a88d6b333091bbfbf3012a4e083d00d31caba \
            detect --source=/repo --redact --verbose --exit-code=1
