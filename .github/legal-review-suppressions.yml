# Canonical legal-review suppressions for the infra-commons portfolio.
#
# These entries suppress recurring by-design findings that the AI reviewer generates
# because it cannot distinguish first-party shared infrastructure from third-party
# dependencies. Each entity repo's own `.github/legal-review-suppressions.yml` can
# add repo-specific entries; canonical entries here take precedence on id collision.
#
# Format:
#   suppressions:
#     - id: unique-kebab-case-id            # required; canonical-wins on id collision
#       file_pattern: "regex"               # matched against finding location
#       finding_pattern: "regex"            # matched against finding title + description
#       reason: "Why this is a false positive for this portfolio"
#
# Severity capped: CRITICAL findings are never suppressed — only HIGH/MEDIUM/LOW.

suppressions:
  - id: "first-party-reusable-workflow"
    file_pattern: ".*"
    finding_pattern: "reusable workflow.{0,40}(external|third.party)|third.party.{0,40}reusable"
    reason: "infra-commons/* reusables are first-party — SHA-pinned supply chain, not external vendors"

  - id: "anthropic-api-key-own-reusable"
    file_pattern: ".*"
    finding_pattern: "ANTHROPIC_API_KEY.{0,60}(external|third.party|reusable)|reusable.{0,40}ANTHROPIC_API_KEY"
    reason: "ANTHROPIC_API_KEY is passed to our own infra-commons/legal and infra-commons/security reusables, documented in sub-processor register"

  - id: "static-jurisdictions-literal"
    file_pattern: ".*"
    finding_pattern: "jurisdictions.{0,40}(user.input|unsanitised|injection|arbitrary)"
    reason: "jurisdictions input is a static caller literal (e.g. 'NZ,AU'), not user-controlled at runtime"

  - id: "static-max-files-literal"
    file_pattern: ".*"
    finding_pattern: "max_files.{0,40}(user.input|unsanitised|injection|arbitrary)"
    reason: "max_files input is a static caller literal, not user-controlled at runtime"

  - id: "suppression-audit-governance"
    file_pattern: ".*"
    finding_pattern: "suppression.{0,40}(bypass|self.auth|circular)|ai.self.authored"
    reason: "Suppressions are governed by PR review and the suppression-audit action; they are not self-authorised"

  - id: "adr-0006-retention-decision-record-accepted-risk-prose"
    file_pattern: "adrs/0006-pii-retention-window-and-purge\\.md"
    finding_pattern: "(legal.?hold.{0,80}(unaudited|audit trail|direct.{0,20}database)|cross.?border disclosure review|Log Analytics scope unresolved|audit log not independent|integrity risk accepted|collection notice|IPP ?[0-9]|APP ?[0-9])"
    reason: >
      ADR-0006's accepted-risk and future-dated-review prose: legal-hold-set-via-DB-audit
      (operations#122), cross-border disclosure review target 2026-10-03 (#123), Log Analytics
      purge scope (#124), audit-log-operator-independence IPP9/APP11 (#125), collection-notice
      IPP3/APP5 (#126). All dispositioned wont-fix in the 2026-07-12 batch as legal-ai commentary
      on a decision record's self-documented commitments. SCOPED to those five themes ONLY — it
      does NOT match the "purge not yet active in prod" gate findings (operations#97/#118), which
      stay OPEN and must keep filing per the carve-out note below. CRITICAL still surfaces.

  # ── Batch-triage 2026-07-11: recurring legal-ai commentary on INTERNAL prose ────────
  # Settled once via the `/issues --batch` decision lane (Kevin, 2026-07-11). Each rule is
  # scoped by file_pattern to a specific internal architecture/policy document so it CANNOT
  # catch (a) customer-facing contracts, or (b) the PII-retention ADR `adrs/0006-...`, whose
  # HIGH "purge not live in prod" findings (operations#97/#118) are deliberately kept OPEN
  # and must still file. Per the conservative policy above, genuine customer-contract IP /
  # retention items are NOT covered here — those stay filed and triaged.

  - id: "three-axis-deployment-model-adr-0007-internal-prose"
    file_pattern: "docs/decisions/0007-three-axis-deployment-model\\.md"
    finding_pattern: "(ip ownership|royalty.?free|perpetual licen|self_operated|handover (runbook|path))"
    reason: >
      ADR 0007 is Rolliq's internal architecture-decision record for the three-axis deployment
      model. The IP-ownership / royalty-free-licence framing and the self_operated handover note
      describe the intended model; the binding legal instrument lives in the IP-ownership policy
      and the per-client DPA, not the ADR. Internal-prose commentary, not a defect.

  - id: "deployment-topology-adr-0005-internal-prose"
    file_pattern: "docs/adr/0005-deployment-topology-and-operations\\.md"
    finding_pattern: "(sole production customer|processor dpa requirement|rolliq_managed|named client)"
    reason: >
      ADR 0005 is Rolliq's internal deployment-topology record. The processor-DPA-per-topology
      note is a design intent tracked in the DPA, not an unenforced control; any client name in
      the ADR is separately governed by the confidential-terms CI guard (the real control), so
      the legal-ai re-flag on the ADR text is noise. Internal-prose commentary, not a defect.

  - id: "openai-account-module-internal-config-prose"
    file_pattern: "modules/azure/openai-account/(main|variables)\\.tf"
    finding_pattern: "(key vault secret.{0,40}(overwritten|overwrite)|no (data )?residency or retention controls|gpt-5.{0,40}(hardcoded|default))"
    reason: >
      The openai-account Terraform module is per-deployment (one Key Vault per client), so a
      shared secret name is not overwritten across clients; residency/retention are enforced at
      the storage/DB layer (australiaeast) not the model deployment; the gpt-5 default is a
      module default overridden per-client in clients-config. Internal infra-config prose.

  - id: "ip-ownership-policy-internal-prose"
    file_pattern: "policies/ip-ownership-and-license\\.md"
    finding_pattern: "(ai.?generated deliverable ip|perpetual licen|licensing field)"
    reason: >
      Rolliq's own IP-ownership-and-license policy document. Enforceability questions on Rolliq's
      internal vesting/licence prose are a policy-maturity discussion, not a code/compliance
      defect; per-client commercial terms are held in clients-config, not this policy. NOTE:
      customer-contract IP clauses (klsjapan/legal, cashbucket/legal reseller agreement) are NOT
      covered by this rule and stay filed.

  - id: "clients-config-self-attested-fields-internal-schema"
    file_pattern: "(schema/client\\.schema\\.json|clients/sandbox\\.yaml)"
    finding_pattern: "(self.?attest|optional and self.?attested|no external dpa counterparty|transcript delivery disclosed only)"
    reason: >
      clients-config self-attested fields (IP-licensing, transcript-delivery, DPA-attestation)
      are the internal record of a per-client decision; the executed instrument is the signed
      DPA held out-of-band, not the config field. Self-attestation is the intended model for
      sandbox/internal environments. Internal-schema prose, not a defect.

  - id: "retention-py-365-day-cap-by-design"
    file_pattern: "src/storage/retention\\.py"
    finding_pattern: "(365|retention (cap|window)).{0,60}(insufficient|legal.?hold|preservation)|audit log.{0,60}(client_id|data categories|no record of what)|wall.?clock.{0,40}last.?modified"
    reason: >
      The 365-day retention cap is the configured DEFAULT purge window, not a legal-hold ceiling;
      legal-hold preservation is a separate, longer-lived control layered on top. The purge audit
      log records client_id + counts by design (privacy-minimising: it does not log the deleted
      PII values). Recurring by-design finding on retention.py; the live "purge not yet active in
      prod" gap is tracked separately as operations#97/#118 (adrs/0006), which stay OPEN.

  - id: "ci-subprocessor-disclosure-review-doc-internal"
    file_pattern: "reviews/2026-06-ci-subprocessor-disclosure\\.md"
    finding_pattern: "(no retention period specified.{0,40}developer pii|openai added as vendor|zero.?retention terms)"
    reason: >
      This is an internal CI-subprocessor-disclosure REVIEW note (the audit record of the
      disclosure decision itself), not a live control. Developer-PII-in-CI retention for the
      Anthropic/OpenAI CI reviewers is a disclosed, accepted sub-processor decision recorded in
      the sub-processor register. Commentary on the review doc, not a defect.

  # ── Batch-triage 2026-07-11 (rolliq-com decision lane), round 2 — mirrors the same PR-time
  # rules landed in the canonical infra-commons/security/.github/legal-review-suppressions.yml
  # (which the post-merge legal-capture-findings-reusable.yml reads) so the PR-time legal-review
  # gate stops flagging the same settled FP families before merge, not just after.
  - id: "security-review-generic-customer-phrasing"
    file_pattern: "SECURITY-REVIEW\\.md"
    finding_pattern: "(microsoft.?aligned|azure ai foundry account).{0,100}(infer|identif|confidential)"
    reason: "Generic customer-category phrasing in a security review doesn't identify the actual client."

  - id: "sandbox-staging-enablement-not-new-risk"
    file_pattern: "clients/sandbox\\.yaml"
    finding_pattern: "(enabled_environments|staging).{0,80}(candidate pii|widens? (the )?surface|self.?attest)"
    reason: "Enabling staging in clients/sandbox.yaml isn't a new risk on its own."

  - id: "security-doc-roadmap-disclosure"
    file_pattern: "docs/SECURITY\\.md"
    finding_pattern: "(PIM|just.?in.?time|periodic (security )?(document )?review).{0,80}(roadmap|not yet configured|standing (process|commitment))"
    reason: "docs/SECURITY.md honestly disclosing PIM/periodic-review as roadmap items is accurate self-disclosure, not a new risk."

  - id: "internal-doc-operational-notes"
    file_pattern: "docs/security-hardening-checklist\\.md"
    finding_pattern: "(personal (work )?email|kev.{0,3}rolliq|claude.{0,40}(sign.?off|perform).{0,40}(security|hardening)|AI agent.{0,40}without.{0,40}human oversight)"
    reason: "Owner email / AI-authored step notes in an internal ops doc are internal notes, not customer-facing risk."

  - id: "classify-call-name-verification-covered"
    file_pattern: "src/workflows/classify_call\\.py"
    finding_pattern: "(candidate name|extract_candidate_name).{0,100}(without.{0,20}(explicit )?(human )?verification|human review)"
    reason: "LLM-extracted candidate name is already covered by the existing human-in-the-loop recruiter review step."

  - id: "dependabot-comment-cosmetic-name"
    file_pattern: "\\.github/dependabot\\.yml"
    finding_pattern: "(first name|named individual).{0,80}(comment|config)"
    reason: "First name in a dependabot.yml config comment is cosmetic."

  - id: "steered-baseline-eval-fixture-not-live-behavior"
    file_pattern: "evals/cases/.*steered-baseline"
    finding_pattern: "(recruiter steering|steering mechanism).{0,80}(eval|fixture|framing|emphasis)"
    reason: "Recruiter steering mechanism in an eval fixture tests robustness, not a live production behavior."

  - id: "trivyignore-removal-is-improvement"
    file_pattern: "\\.trivyignore"
    finding_pattern: "(AVD-AZU-0012|suppression removed|re.?enabl(ed|ing)).{0,80}(scan|scanned|public network access)"
    reason: ".trivyignore suppression removal (re-enabling a scan) is an improvement, not a new risk."
